{% extends "base.html" %}
{% block title %}audit{% endblock %}
{% block content %}
<h2>Audit log</h2>
<p class="muted">Last 200 events.</p>

<table>
    <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th><th>Detail</th></tr></thead>
    <tbody>
    {% for r in rows %}
        <tr>
            <td><small>{{ r.ts }}</small></td>
            <td>{{ r.actor }}</td>
            <td><code>{{ r.action }}</code></td>
            <td><small>{{ r.target or "" }}</small></td>
            <td><small>{{ r.detail or "" }}</small></td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
