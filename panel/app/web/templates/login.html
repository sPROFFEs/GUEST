<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ gateway_name }} — sign in</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
<main class="login-shell">
    <article class="card login-card">
        <header>
            <span class="login-mark">{{ gateway_name[:1] | upper }}</span>
            <strong>{{ gateway_name }}</strong>
            <span class="muted">Sign in to manage this gateway.</span>
        </header>
        <div class="body">
            {% if error %}
            <div class="banner banner-error login-error">
                <span>{{ error }}</span>
            </div>
            {% endif %}
            <form method="post" action="/login">
                <label>Username
                    <input type="text" name="username" autocomplete="username" required autofocus>
                </label>
                <label>Password
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>
                <button type="submit" class="btn-full">Sign in</button>
            </form>
        </div>
    </article>
</main>
</body>
</html>
